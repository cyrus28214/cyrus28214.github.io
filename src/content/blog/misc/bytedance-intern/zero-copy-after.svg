<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="1100" height="500" fill="#fff"/>

  <!-- 区域分隔线 -->
  <line x1="40" y1="210" x2="1060" y2="210" stroke="#bbb" stroke-dasharray="4 4"/>
  <line x1="550" y1="40" x2="550" y2="470" stroke="#bbb" stroke-dasharray="4 4"/>

  <!-- 左右标题 -->
  <text x="295" y="50" text-anchor="middle" font-weight="600" fill="#444">Client（写）</text>
  <text x="805" y="50" text-anchor="middle" font-weight="600" fill="#444">Server（读）</text>

  <!-- 行标签 -->
  <text x="48" y="115" font-weight="600" fill="#666">业务代码</text>
  <text x="48" y="280" font-weight="600" fill="#666">archon 代码</text>

  <!-- ============ 左：Client（写） ============ -->
  <!-- 用户 binary（粗框，强调外部已有） -->
  <rect x="225" y="68" width="140" height="22" fill="#fff" stroke="#222" stroke-width="2"/>
  <text x="295" y="83" text-anchor="middle" font-size="11">XXXXXXXXXXXXXXXXX</text>

  <!-- 指针引用 binary → struct -->
  <line x1="295" y1="90" x2="295" y2="118" stroke="#555" marker-end="url(#arrow)"/>
  <text x="345" y="108" font-weight="600">指针引用</text>

  <!-- thrift struct -->
  <ellipse cx="295" cy="130" rx="140" ry="16" fill="#EAE6F7" stroke="#7E6BC4"/>
  <rect x="245" y="122" width="100" height="16" fill="#fff" stroke="#7E6BC4"/>
  <text x="295" y="134" text-anchor="middle" font-size="11">XXXXXXXXXXXXX</text>
  <text x="178" y="134" font-size="11" fill="#444">thrift struct</text>

  <!-- thrift 序列化 (指针引用) -->
  <line x1="245" y1="138" x2="280" y2="328" stroke="#555" marker-end="url(#arrow)"/>
  <line x1="345" y1="138" x2="460" y2="328" stroke="#555" marker-end="url(#arrow)"/>
  <text x="295" y="240" text-anchor="middle" font-weight="600">指针引用</text>

  <!-- IOBuf 链表（写）：node1 -> type+len -> binary(ref, 粗虚框) -> node3 -->
  <rect x="80" y="330" width="60" height="32" fill="#fff" stroke="#7E6BC4"/>
  <text x="110" y="350" text-anchor="middle" font-size="11">node</text>
  <line x1="140" y1="346" x2="170" y2="346" stroke="#555" marker-end="url(#arrow)"/>

  <rect x="170" y="330" width="80" height="32" fill="#EAE6F7" stroke="#7E6BC4"/>
  <text x="210" y="350" text-anchor="middle" font-size="11">type+len</text>
  <line x1="250" y1="346" x2="280" y2="346" stroke="#555" marker-end="url(#arrow)"/>

  <rect x="280" y="328" width="180" height="36" fill="#fff" stroke="#222" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="370" y="350" text-anchor="middle" font-size="11">XXXXXXXXXXXXXXXXX (ref)</text>
  <line x1="460" y1="346" x2="490" y2="346" stroke="#555" marker-end="url(#arrow)"/>

  <rect x="490" y="330" width="50" height="32" fill="#fff" stroke="#7E6BC4"/>
  <text x="515" y="350" text-anchor="middle" font-size="11">node</text>
  <text x="64" y="382" font-size="11" fill="#444">thrift 序列化后的数据（IOBuf 链表）</text>

  <!-- 写到 socket buffer -->
  <line x1="295" y1="384" x2="295" y2="418" stroke="#888" stroke-dasharray="4 3" marker-end="url(#arrowDash)"/>

  <!-- socket write buffer -->
  <rect x="80" y="420" width="430" height="32" fill="#F4F4F4" stroke="#999" stroke-dasharray="4 3"/>
  <text x="295" y="440" text-anchor="middle" font-size="12">socket write buffer</text>

  <!-- ============ 右：Server（读） ============ -->
  <!-- binary 区块（指向 read buffer） -->
  <rect x="735" y="68" width="140" height="22" fill="#fff" stroke="#222" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="805" y="83" text-anchor="middle" font-size="11">XXXXXXXXXXXXXXXXX</text>

  <!-- struct → binary（指针引用） -->
  <line x1="805" y1="118" x2="805" y2="90" stroke="#555" marker-end="url(#arrow)"/>
  <text x="855" y="108" font-weight="600">指针引用</text>

  <!-- thrift struct -->
  <ellipse cx="805" cy="130" rx="140" ry="16" fill="#EAE6F7" stroke="#7E6BC4"/>
  <rect x="755" y="122" width="100" height="16" fill="#fff" stroke="#7E6BC4"/>
  <text x="805" y="134" text-anchor="middle" font-size="11">XXXXXXXXXXXXX</text>
  <text x="688" y="134" font-size="11" fill="#444">thrift struct</text>

  <!-- thrift 反序列化（指针引用） -->
  <line x1="790" y1="328" x2="755" y2="138" stroke="#555" marker-end="url(#arrow)"/>
  <line x1="970" y1="328" x2="855" y2="138" stroke="#555" marker-end="url(#arrow)"/>
  <text x="805" y="240" text-anchor="middle" font-weight="600">指针引用</text>

  <!-- IOBuf 链表（读）-->
  <rect x="590" y="330" width="60" height="32" fill="#fff" stroke="#7E6BC4"/>
  <text x="620" y="350" text-anchor="middle" font-size="11">node</text>
  <line x1="650" y1="346" x2="680" y2="346" stroke="#555" marker-end="url(#arrow)"/>

  <rect x="680" y="330" width="80" height="32" fill="#EAE6F7" stroke="#7E6BC4"/>
  <text x="720" y="350" text-anchor="middle" font-size="11">type+len</text>
  <line x1="760" y1="346" x2="790" y2="346" stroke="#555" marker-end="url(#arrow)"/>

  <rect x="790" y="328" width="180" height="36" fill="#fff" stroke="#222" stroke-width="2"/>
  <text x="880" y="350" text-anchor="middle" font-size="11">XXXXXXXXXXXXXXXXX (data)</text>
  <line x1="970" y1="346" x2="1000" y2="346" stroke="#555" marker-end="url(#arrow)"/>

  <rect x="1000" y="330" width="50" height="32" fill="#fff" stroke="#7E6BC4"/>
  <text x="1025" y="350" text-anchor="middle" font-size="11">node</text>
  <text x="574" y="382" font-size="11" fill="#444">thrift 反序列化前的数据（IOBuf 链表）</text>

  <!-- 从 read buffer 取出 -->
  <line x1="805" y1="418" x2="805" y2="384" stroke="#888" stroke-dasharray="4 3" marker-end="url(#arrowDash)"/>

  <!-- socket read buffer -->
  <rect x="590" y="420" width="430" height="32" fill="#F4F4F4" stroke="#999" stroke-dasharray="4 3"/>
  <text x="805" y="440" text-anchor="middle" font-size="12">socket read buffer</text>

  <!-- 网络 -->
  <line x1="510" y1="436" x2="590" y2="436" stroke="#555" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="550" y="427" text-anchor="middle" font-size="11" fill="#666">网络</text>
</svg>
